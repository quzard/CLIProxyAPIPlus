name: docker-image

on:
  workflow_dispatch:
    inputs:
      build_arm64:
        description: Build and publish ARM64 image
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/cli-proxy-api-plus
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/cli-proxy-api-plus

jobs:
  docker_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest-amd64
            ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}-amd64
            ${{ env.GHCR_IMAGE }}:latest-amd64
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-amd64

  docker_arm64:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_arm64) || vars.ENABLE_ARM64_ON_PUSH == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest-arm64
            ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}-arm64
            ${{ env.GHCR_IMAGE }}:latest-arm64
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-arm64

  docker_manifest:
    if: ${{ always() && needs.docker_amd64.result == 'success' && (needs.docker_arm64.result == 'success' || needs.docker_arm64.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
      - docker_amd64
      - docker_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Create and push multi-arch manifests
        run: |
          create_manifest() {
            local target="$1"
            shift

            local attempt=1
            local max_attempts=12
            local sleep_seconds=10

            while true; do
              if docker buildx imagetools create --tag "${target}" "$@"; then
                echo "Manifest created: ${target}"
                return 0
              fi

              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "Manifest create failed after ${max_attempts} attempts: ${target}"
                return 1
              fi

              echo "Manifest sources not ready yet for ${target}; retry ${attempt}/${max_attempts} after ${sleep_seconds}s"
              attempt=$((attempt + 1))
              sleep "${sleep_seconds}"
            done
          }

          if [ "${{ needs.docker_arm64.result }}" = "success" ]; then
            create_manifest "${DOCKERHUB_REPO}:latest" \
              "${DOCKERHUB_REPO}:latest-amd64" \
              "${DOCKERHUB_REPO}:latest-arm64"
            create_manifest "${DOCKERHUB_REPO}:${VERSION}" \
              "${DOCKERHUB_REPO}:${VERSION}-amd64" \
              "${DOCKERHUB_REPO}:${VERSION}-arm64"
            create_manifest "${GHCR_IMAGE}:latest" \
              "${GHCR_IMAGE}:latest-amd64" \
              "${GHCR_IMAGE}:latest-arm64"
            create_manifest "${GHCR_IMAGE}:${VERSION}" \
              "${GHCR_IMAGE}:${VERSION}-amd64" \
              "${GHCR_IMAGE}:${VERSION}-arm64"
          else
            create_manifest "${DOCKERHUB_REPO}:latest" \
              "${DOCKERHUB_REPO}:latest-amd64"
            create_manifest "${DOCKERHUB_REPO}:${VERSION}" \
              "${DOCKERHUB_REPO}:${VERSION}-amd64"
            create_manifest "${GHCR_IMAGE}:latest" \
              "${GHCR_IMAGE}:latest-amd64"
            create_manifest "${GHCR_IMAGE}:${VERSION}" \
              "${GHCR_IMAGE}:${VERSION}-amd64"
          fi
      - name: Cleanup temporary tags
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          namespace="${DOCKERHUB_REPO%%/*}"
          repo_name="${DOCKERHUB_REPO#*/}"

          token="$(
            curl -fsSL \
              -H 'Content-Type: application/json' \
              -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
              'https://hub.docker.com/v2/users/login/' \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])'
          )"

          delete_tag() {
            local tag="$1"
            local url="https://hub.docker.com/v2/repositories/${namespace}/${repo_name}/tags/${tag}/"
            local http_code
            http_code="$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: JWT ${token}" "${url}" || true)"
            if [ "${http_code}" = "204" ] || [ "${http_code}" = "404" ]; then
              echo "Docker Hub tag removed (or missing): ${DOCKERHUB_REPO}:${tag} (HTTP ${http_code})"
              return 0
            fi
            echo "Docker Hub tag delete failed: ${DOCKERHUB_REPO}:${tag} (HTTP ${http_code})"
            return 0
          }

          delete_tag "latest-amd64"
          delete_tag "latest-arm64"
          delete_tag "${VERSION}-amd64"
          delete_tag "${VERSION}-arm64"
